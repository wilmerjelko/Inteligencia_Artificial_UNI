# Ablacion 2: ResNet-50 + Focal Loss (gamma=2, alpha=0.5) + augmentation
model: resnet50
freeze_backbone: true
loss: focal
focal_gamma: 2.0
focal_alpha: 0.5
augmentation: true
img_size: 224
batch_size: 32
seed: 42
val_split: 0.15
epochs_head: 5
epochs: 15
patience: 5
lr_head: 0.001
lr_ft: 0.0001
ft_layers: [layer3, layer4, fc]
checkpoint_name: resnet50_focal.pt
run_error_analysis: false
# data_dir: tire_data/Tire Textures
