# Ablacion 3: TireCNN desde cero (sin Transfer Learning) + BCE + augmentation
# Contrasta con el baseline que usa ResNet-50 preentrenado
model: tirecnn
dropout: 0.4

loss: bce
augmentation: true
img_size: 224
batch_size: 32
seed: 42
val_split: 0.15

epochs: 50
patience: 10
lr: 0.001

checkpoint_name: tirecnn_scratch.pt
run_error_analysis: false
# data_dir: tire_data/Tire Textures
